apiVersion: v1                    # Kubernetes core API version
kind: Pod                         # Resource type: Pod

metadata:                         # Metadata section
  name: secret-pod-demo           # Name of the Pod

spec:                             # Desired state/specification of the Pod
  containers:                     # List of containers in this Pod
  - name: nginx                   # Container name
    image: nginx                  # Container image (official nginx)

    envFrom:                      # Import environment variables from external sources
    - secretRef:                  # Reference to a Secret
        name: pod-secret          # Name of the Secret (must exactly match existing Secret)