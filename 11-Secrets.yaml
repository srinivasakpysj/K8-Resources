apiVersion: v1                      # Core Kubernetes API version (v1 supports Secret resource)
kind: Secret                        # Declares this object as a Secret (used to store sensitive data securely)

metadata:                           # Metadata contains identifying information
  name: pod-Secret                  # Name of the Secret (must match reference used in Pod)

type: Opaque                        # Default Secret type (generic key-value pairs)

# data section must contain base64-encoded values only
data:
  username: "YWRtaW4K"              # Base64 encoded value of 'admin' (echo 'admin' | base64 → includes newline)
  password: "YWRtaW4xMjMK"          # Base64 encoded value of 'admin123' (includes newline due to echo)