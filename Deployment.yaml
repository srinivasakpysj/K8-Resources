apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-app
  labels:
    app: nginx-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-app

  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
      - name: nginx-app
        image: nginx

        ports:
        - containerPort: 8000

        volumeMounts:
        - mountPath: /opt
          name: db-connection

      volumes:
      - name: db-connection
        configMap:
          name: test-configmap