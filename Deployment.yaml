apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-app
  labels:
    app: nginx-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-app

  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
      - name: nginx-app
        image: nginx

        ports:
        - containerPort: 8000

        volumeMounts:
        - mountPath: /etc/secret
          name: secret-volume
          readOnly: true

      volumes:
      - name: secret-volume
        secret:
          secretName: app-secret